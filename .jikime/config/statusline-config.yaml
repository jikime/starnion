# JikiME-ADK Statusline Configuration
# UI format: claude-statusline compatible (by Kamran Ahmed)
# Updated: 2026-03-09

# ── UI Layout ──────────────────────────────────────────────────────────────
# Line 1: Model │ ✍️ Context% │ Directory (branch*) │ ⏱ Session │ ◐/◑ thinking
#
# current ●●●●●○○○○○  45% ⟳ 2:30pm    (5-hour window)
# weekly  ○○○○○○○○○○   7% ⟳ mar 15    (7-day window)
# extra   ●●○○○○○○○○  $12.50/$50.00    (if enabled)
# resets  apr 1

# ── Rate Limit Settings ────────────────────────────────────────────────────
rate_limit:
  # OAuth token resolution order:
  #   1. CLAUDE_CODE_OAUTH_TOKEN env var
  #   2. macOS Keychain (security find-generic-password -s "Claude Code-credentials")
  #   3. ~/.claude/.credentials.json
  #   4. Linux secret-tool
  cache_seconds: 60                # File cache at /tmp/claude/statusline-usage-cache.json

# ── Thinking Status ────────────────────────────────────────────────────────
# ◐ thinking (magenta) = alwaysThinkingEnabled: true  in ~/.claude/settings.json
# ◑ thinking (dim)     = disabled or unset

# ── Context Window ─────────────────────────────────────────────────────────
# Reads from Claude Code stdin JSON:
#   primary:  context_window.current_usage.{input_tokens, cache_creation_input_tokens, cache_read_input_tokens}
#   fallback: context_window.{total_input_tokens, total_output_tokens}
#   default:  200,000 tokens if context_window_size is 0 or missing

# ── Color Palette (ANSI RGB) ───────────────────────────────────────────────
# Model name:     RGB(0, 153, 255)   blue
# Context %:      green/orange/yellow/red by usage level
#   0-49%:        RGB(0, 175, 80)    green
#   50-69%:       RGB(255, 176, 85)  orange
#   70-89%:       RGB(230, 200, 0)   yellow
#   90-100%:      RGB(255, 85, 85)   red
# Directory:      RGB(86, 182, 194)  cyan
# Git branch:     RGB(0, 175, 80)    green
# Git dirty (*):  RGB(255, 85, 85)   red
# Thinking on:    RGB(180, 140, 255) magenta
# Thinking off:   dim
# Separator (│):  dim
# Bar filled (●): color by usage %
# Bar empty (○):  dim
