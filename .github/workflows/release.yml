name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: gateway/go.mod
          cache: true
          cache-dependency-path: gateway/go.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Update install.sh on GitHub Pages after release
  update-pages:
    name: Update GitHub Pages
    needs: goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update version in docs/install.sh
        run: |
          sed -i "s/^STARPION_VERSION=.*/STARPION_VERSION=\"${{ steps.version.outputs.version }}\"/" docs/install.sh

      - name: Update version in docs/update.md
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Update any hardcoded version examples in update.md
          sed -i "s/STARPION_VERSION=[0-9]*\.[0-9]*\.[0-9]*/STARPION_VERSION=${VERSION}/g" docs/update.md || true

      - name: Commit updated docs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/install.sh docs/update.md
          git diff --staged --quiet || git commit -m "chore: update docs to v${{ steps.version.outputs.version }}"
          git push
