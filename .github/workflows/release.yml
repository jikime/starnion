name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: gateway/go.mod
          cache: true
          cache-dependency-path: gateway/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"  # pin major version — matches project's pnpm 10.x

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Update _STARNION_PINNED in docs/install.sh after a successful release
  update-pages:
    name: Update install.sh version
    needs: goreleaser
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract and validate version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format: '$VERSION' (expected X.Y.Z)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update _STARNION_PINNED in docs/install.sh
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^_STARNION_PINNED=.*/_STARNION_PINNED=\"${VERSION}\"/" docs/install.sh
          # Verify the substitution actually took effect
          if ! grep -qF "_STARNION_PINNED=\"${VERSION}\"" docs/install.sh; then
            echo "::error::sed did not update _STARNION_PINNED in docs/install.sh — check the pattern"
            exit 1
          fi

      - name: Update version in docs/_config.yml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Update starnion_version field
          sed -i "s/^starnion_version:.*/starnion_version: \"${VERSION}\"/" docs/_config.yml
          # Update the version number and tag link in footer_content
          sed -i "s|/releases/tag/v[0-9]*\.[0-9]*\.[0-9]*|/releases/tag/v${VERSION}|g" docs/_config.yml
          sed -i "s|>v[0-9]*\.[0-9]*\.[0-9]*<|>v${VERSION}<|g" docs/_config.yml
          # Verify
          if ! grep -qF "starnion_version: \"${VERSION}\"" docs/_config.yml; then
            echo "::error::sed did not update starnion_version in docs/_config.yml — check the pattern"
            exit 1
          fi

      - name: Commit and push updated docs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/install.sh docs/_config.yml
          if git diff --staged --quiet; then
            echo "install.sh already at v${{ steps.version.outputs.version }} — nothing to commit"
            exit 0
          fi
          git commit -m "chore: update docs to v${{ steps.version.outputs.version }}"
          # Retry push up to 3 times to handle concurrent commits landing on main
          # while goreleaser was running (non-fast-forward race condition).
          for attempt in 1 2 3; do
            git pull --rebase && git push && break
            if [[ "$attempt" == "3" ]]; then
              echo "::error::Failed to push after 3 attempts"
              exit 1
            fi
            echo "Push attempt ${attempt} failed, retrying in 5s..."
            sleep 5
          done
