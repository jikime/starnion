name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: gateway/go.mod
          cache: true
          cache-dependency-path: gateway/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Update install.sh on GitHub Pages after release
  update-pages:
    name: Update GitHub Pages
    needs: goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update version in docs/install.sh
        run: |
          sed -i "s/^_STARNION_PINNED=.*/_STARNION_PINNED=\"${{ steps.version.outputs.version }}\"/" docs/install.sh

      - name: Commit updated docs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/install.sh
          git diff --staged --quiet || git commit -m "chore: update docs to v${{ steps.version.outputs.version }}"
          # Rebase onto latest main in case other commits landed while goreleaser was running.
          git pull --rebase
          git push
