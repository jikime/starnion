name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: gateway/go.mod
          cache: true
          cache-dependency-path: gateway/go.sum

      - name: Sync migrations for embed
        run: |
          rm -rf gateway/internal/cli/migrations
          cp -r docker/migrations gateway/internal/cli/migrations

      - name: Build starnion CLI
        run: |
          cd gateway
          go build -ldflags="-s -w -X github.com/jikime/starnion/gateway/internal/cli.version=dev" \
            -o /tmp/starnion ./cmd/starnion

      - name: Build gateway server
        run: |
          cd gateway
          go build -o /tmp/gateway ./cmd/gateway

      - name: Verify CLI runs
        run: /tmp/starnion version

      - name: Go vet
        run: |
          cd gateway
          go vet ./...

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Build Next.js UI (standalone)
        run: |
          cd ui
          pnpm install --frozen-lockfile
          NEXT_STANDALONE=1 pnpm build
