# ─────────────────────────────────────────────────────────────────────────────
# StarNion — lets.ai.kr  (Nginx reverse proxy)
#
# Web (Next.js)  → localhost:3893
# Gateway (API)  → localhost:8080  (WebSocket /ws)
#
# Install:
#   sudo cp lets.ai.kr.conf /etc/nginx/sites-available/lets.ai.kr
#   sudo ln -s /etc/nginx/sites-available/lets.ai.kr /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (Let's Encrypt):
#   sudo certbot --nginx -d lets.ai.kr
# ─────────────────────────────────────────────────────────────────────────────

# WebSocket upgrade map
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

# Upstream
upstream lets_ai_kr {
    server 127.0.0.1:3893;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name lets.ai.kr;
    return 301 https://$server_name$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lets.ai.kr;

    # ── SSL ───────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/lets.ai.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lets.ai.kr/privkey.pem;

    # SSL settings (inline — no dependency on certbot options file)
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    # ── gzip ──────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # ── Upload size ───────────────────────────────────────────────────────────
    client_max_body_size 50m;

    # ── Common proxy headers ──────────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        $connection_upgrade;

    # ── WebSocket: /ws → Gateway (direct) ─────────────────────────────────────
    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── SSE / Streaming: chat, logs ───────────────────────────────────────────
    location = /api/chat {
        proxy_pass         http://lets_ai_kr;
        proxy_buffering    off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        gzip               off;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options           "SAMEORIGIN"                          always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    }

    location = /api/logs/gateway/stream {
        proxy_pass         http://lets_ai_kr;
        proxy_buffering    off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        gzip               off;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options           "SAMEORIGIN"                          always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    }

    # ── WebSocket via Next.js API (fallback) ──────────────────────────────────
    location = /api/ws {
        proxy_pass         http://lets_ai_kr;
        proxy_buffering    off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        gzip               off;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options           "SAMEORIGIN"                          always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    }

    # ── Static assets cache ───────────────────────────────────────────────────
    location /_next/static/ {
        proxy_pass      http://lets_ai_kr;
        proxy_buffering on;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options           "SAMEORIGIN"                          always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
        add_header Cache-Control             "public, max-age=31536000, immutable" always;
    }

    # ── Default → Next.js ─────────────────────────────────────────────────────
    location / {
        proxy_pass          http://lets_ai_kr;
        proxy_buffering     on;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options           "SAMEORIGIN"                          always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    }
}
