services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jiki-postgres
    environment:
      POSTGRES_DB: jiki
      POSTGRES_USER: jiki
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jiki_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jiki"]
      interval: 5s
      timeout: 5s
      retries: 5

  agent:
    build:
      context: ../agent
      dockerfile: ../docker/Dockerfile.agent
    container_name: jiki-agent
    ports:
      - "50051:50051"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=postgres://jiki:${POSTGRES_PASSWORD:-jiki_dev_password}@postgres:5432/jiki?sslmode=disable
      - GRPC_PORT=50051
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build:
      context: ../gateway
      dockerfile: ../docker/Dockerfile.gateway
    container_name: jiki-gateway
    ports:
      - "8080:8080"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GRPC_AGENT_HOST=agent
      - DATABASE_URL=postgres://jiki:${POSTGRES_PASSWORD:-jiki_dev_password}@postgres:5432/jiki?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - MINIO_ENDPOINT=gilgeori-minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-gilgeori}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-gilgeori3893}
      - MINIO_BUCKET=${MINIO_BUCKET:-jiki-files}
      - MINIO_PUBLIC_URL=${MINIO_PUBLIC_URL:-http://localhost:9000}
    networks:
      - default
      - gilgeori_net
    depends_on:
      postgres:
        condition: service_healthy
      agent:
        condition: service_started

networks:
  gilgeori_net:
    external: true

volumes:
  postgres_data:
