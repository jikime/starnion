syntax = "proto3";

package starnion.v1;

option go_package = "github.com/jikime/starnion/gateway/gen/starnion/v1;starnionv1";

// AgentService handles communication between Gateway and Agent.
service AgentService {
  // Chat processes a user message and returns the agent response.
  rpc Chat(ChatRequest) returns (ChatResponse);
  // ChatStream returns agent responses as a token stream.
  rpc ChatStream(ChatRequest) returns (stream ChatResponse);
  // GenerateReport produces a periodic summary report for a user.
  rpc GenerateReport(ReportRequest) returns (ReportResponse);
  // GetHistory returns prior messages for a conversation thread.
  rpc GetHistory(HistoryRequest) returns (HistoryResponse);
  // SubmitApproval resumes a paused agent run with a user approve/reject decision.
  // The agent graph is interrupted when a risky tool (e.g. calendar_delete,
  // mail_send) is about to run; the gateway calls this RPC after the user
  // responds via Telegram to let execution continue or cancel.
  rpc SubmitApproval(ApprovalRequest) returns (stream ChatResponse);
}

message ChatRequest {
  string user_id = 1;
  string message = 2;
  string model = 3;
  // Optional file input for multimodal processing.
  FileInput file = 4;
  // Optional conversation thread ID; defaults to user_id when empty.
  string thread_id = 5;
}

message ChatResponse {
  string content = 1;
  ResponseType type = 2;
  // Tool call information (when type = TOOL_CALL).
  string tool_name = 3;
  string tool_result = 4;
  // File response fields (when type = FILE).
  bytes file_data = 5;
  string file_name = 6;
  string file_mime = 7;
}

enum ResponseType {
  RESPONSE_TYPE_UNSPECIFIED = 0;
  TEXT = 1;
  TOOL_CALL = 2;
  TOOL_RESULT = 3;
  ERROR = 4;
  STREAM_END = 5;
  FILE = 6;
  // PENDING_APPROVAL is emitted when the agent has been interrupted and is
  // waiting for the user to approve or reject a risky tool call.
  // Fields used: content (human-readable description), tool_name (tool that
  // will be invoked), tool_result (JSON-encoded action detail / parameters).
  PENDING_APPROVAL = 7;
}

message FileInput {
  string file_type = 1;   // "image", "document", "audio"
  string file_url = 2;    // Storage URL (avoids 4MB gRPC limit)
  string file_name = 3;
}

message HistoryRequest {
  string thread_id = 1;
}

message HistoryMessage {
  string role = 1;    // "user" or "assistant"
  string content = 2;
}

message HistoryResponse {
  repeated HistoryMessage messages = 1;
}

message ReportRequest {
  string user_id = 1;
  string report_type = 2; // "weekly", "monthly"
}

message ReportResponse {
  string content = 1;
  string report_type = 2;
}

// ApprovalRequest resumes a LangGraph thread that was interrupted while
// waiting for explicit user confirmation before a risky tool call.
message ApprovalRequest {
  // user_id is the UUID of the user whose graph is being resumed.
  string user_id = 1;
  // thread_id is the LangGraph checkpoint thread to resume.
  // Defaults to user_id when empty (same convention as ChatRequest).
  string thread_id = 2;
  // approved indicates whether the user granted or denied permission.
  bool approved = 3;
  // reason is an optional free-text explanation from the user (shown to agent).
  string reason = 4;
}
