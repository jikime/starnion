version: 2

project_name: starnion

before:
  hooks:
    # Sync migration files into the CLI embed directory before build
    - sh -c "rm -rf gateway/internal/cli/migrations && cp -r docker/migrations gateway/internal/cli/migrations"
    # Build Next.js UI in standalone mode
    - sh -c "cd ui && NEXT_STANDALONE=1 pnpm install --frozen-lockfile && NEXT_STANDALONE=1 pnpm build"
    # Prepare staging directory: agent source + UI standalone
    # Use .staging/ (not dist/) to avoid conflict with goreleaser --clean
    - sh -c "rm -rf .staging && mkdir -p .staging/agent .staging/ui"
    - sh -c "cp -r agent/src agent/pyproject.toml .staging/agent/ && (test -f agent/uv.lock && cp agent/uv.lock .staging/agent/ || true)"
    - sh -c "cp -rL ui/.next/standalone/. .staging/ui/ && cp -r ui/.next/static .staging/ui/.next/static && cp -r ui/public .staging/ui/public"

builds:
  - id: starnion
    dir: gateway
    main: ./cmd/starnion
    binary: starnion
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/jikime/starnion/gateway/internal/cli.version={{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: gateway
    dir: gateway
    main: ./cmd/gateway
    binary: starnion-gateway
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: starnion
    builds:
      - starnion
      - gateway
    name_template: "starnion_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    files:
      - src: .staging/agent/**
        dst: agent
        strip_parent: true
      - src: .staging/ui/**
        dst: ui
        strip_parent: true

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: jikime
    name: starnion
  name_template: "v{{ .Version }}"
  header: |
    ## StarNion v{{ .Version }}

    Personal AI Assistant — CLI release.

    ### 설치
    ```bash
    curl -fsSL https://jikime.github.io/starnion/install.sh | bash
    ```

    ### 업데이트
    ```bash
    starnion update
    ```
  footer: |
    ---
    **Full Changelog**: https://github.com/jikime/starnion/compare/{{ .PreviousTag }}...{{ .Tag }}

changelog:
  use: github
  sort: asc
  groups:
    - title: "새 기능"
      regexp: "^feat"
      order: 0
    - title: "버그 수정"
      regexp: "^fix"
      order: 1
    - title: "기타"
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"
      - "typo"
