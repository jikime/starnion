# ─────────────────────────────────────────────────────────────────────────────
# Starnion nginx config — lets.ai.kr
#
# Place in /etc/nginx/sites-available/lets.ai.kr
# Symlink: ln -s /etc/nginx/sites-available/lets.ai.kr /etc/nginx/sites-enabled/
# Test:    nginx -t
# Reload:  systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

# WebSocket Connection 헤더 처리:
# 일반 HTTP 요청에 Connection: upgrade를 붙이면 일부 백엔드에서 오동작한다.
# map 블록으로 WebSocket 업그레이드 요청일 때만 "upgrade"로, 나머지는 ""로 설정한다.
map $http_upgrade $connection_upgrade {
    default  upgrade;
    ''       "";
}

upstream lets_ai_kr {
    server 127.0.0.1:3893;
    keepalive 64;
}

# ── HTTP → HTTPS 리다이렉트 ────────────────────────────────────────────────
server {
    listen 80;
    server_name lets.ai.kr www.lets.ai.kr;

    # Let's Encrypt 인증서 갱신
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://lets.ai.kr$request_uri;
    }
}

# ── www → non-www 리다이렉트 (canonical URL 통일) ──────────────────────────
server {
    listen 443 ssl http2;
    server_name www.lets.ai.kr;

    ssl_certificate     /etc/letsencrypt/live/lets.ai.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lets.ai.kr/privkey.pem;

    return 301 https://lets.ai.kr$request_uri;
}

# ── HTTPS 메인 서버 ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name lets.ai.kr;

    # ── SSL 인증서 (Let's Encrypt) ──────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/lets.ai.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lets.ai.kr/privkey.pem;

    # ── SSL 세션 ───────────────────────────────────────────────────────────
    ssl_session_timeout  1d;
    ssl_session_cache    shared:SSL:50m;
    ssl_session_tickets  off;

    # ── SSL 프로토콜 / 암호화 ──────────────────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # ── HSTS ───────────────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ── Gzip 압축 (SSE/스트리밍 경로 제외 — 해당 location 블록에서 off) ───
    # text/event-stream 은 gzip_types 목록에서 의도적으로 제외한다.
    # gzip + 스트리밍은 nginx가 청크를 flush 하지 않아 이벤트가 묶여서 도착한다.
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # ── 파일 업로드 크기 제한 ──────────────────────────────────────────────
    # 기본값 1m → 1MB 초과 업로드 시 413 에러 발생.
    # MinIO 직접 업로드이므로 게이트웨이 경유 업로드 최대 크기에 맞춘다.
    client_max_body_size 50m;

    # ── 공통 프록시 헤더 ───────────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    # map 블록에서 계산한 값 사용 (일반 요청: "", WebSocket: "upgrade")
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        $connection_upgrade;

    # ── SSE / 스트리밍 location ────────────────────────────────────────────
    # 규칙:
    #   proxy_buffering off  — nginx가 SSE 이벤트를 버퍼링하지 않고 즉시 전달
    #   proxy_read_timeout 300s  — LLM 툴체인이 60초 이상 소요될 수 있음
    #                              (게이트웨이/에이전트 3분 타임아웃 + 여유)
    #   gzip off  — 스트리밍과 gzip 압축은 양립 불가
    #   보안 헤더 재선언  — nginx의 add_header는 location 블록에서 오버라이드 시
    #                       상위(server) 블록의 add_header 전체가 무시됨

    location = /api/chat {
        proxy_pass         http://lets_ai_kr;
        proxy_buffering    off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        gzip               off;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options           "SAMEORIGIN"                          always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    }

    location = /api/logs/gateway/stream {
        proxy_pass         http://lets_ai_kr;
        proxy_buffering    off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        gzip               off;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options           "SAMEORIGIN"                          always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    }

    # ── WebSocket ──────────────────────────────────────────────────────────
    location = /api/ws {
        proxy_pass         http://lets_ai_kr;
        proxy_buffering    off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        gzip               off;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options           "SAMEORIGIN"                          always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    }

    # ── 정적 파일 캐싱 ─────────────────────────────────────────────────────
    # add_header가 있으므로 보안 헤더 반드시 재선언한다.
    location /_next/static/ {
        proxy_pass      http://lets_ai_kr;
        proxy_buffering on;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options           "SAMEORIGIN"                          always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
        add_header Cache-Control             "public, max-age=31536000, immutable" always;
    }

    # ── 일반 요청 ──────────────────────────────────────────────────────────
    location / {
        proxy_pass          http://lets_ai_kr;
        proxy_buffering     on;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options           "SAMEORIGIN"                          always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    }
}
