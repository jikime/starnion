# Starnion nginx reverse proxy configuration
# Place in /etc/nginx/sites-available/starnion and symlink to sites-enabled/
#
# Key SSE settings:
#   proxy_read_timeout 300s  — LLM tool chains can take >60s; default 60s kills the stream
#   proxy_buffering off      — deliver SSE events immediately; never buffer server-sent events
#   gzip off (event-stream)  — gzip is incompatible with streaming; disable per-location

upstream starnion_ui {
    server 127.0.0.1:3893;
    keepalive 16;
}

upstream starnion_gateway {
    server 127.0.0.1:8080;
    keepalive 16;
}

# HTTP → HTTPS redirect (remove if not using TLS)
# server {
#     listen 80;
#     server_name your-domain.com;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl http2;
    server_name localhost;  # ← replace with your domain

    # --- TLS (uncomment when using HTTPS) ---
    # ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_prefer_server_ciphers on;

    # ── Global proxy defaults ──────────────────────────────────────────────────
    proxy_http_version  1.1;
    proxy_set_header    Host              $host;
    proxy_set_header    X-Real-IP         $remote_addr;
    proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header    X-Forwarded-Proto $scheme;
    proxy_set_header    Upgrade           $http_upgrade;
    proxy_set_header    Connection        "upgrade";

    # ── Regular request timeouts ──────────────────────────────────────────────
    proxy_connect_timeout   10s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;   # overridden to 300s for SSE locations below

    # ── SSE / streaming locations ──────────────────────────────────────────────
    # These locations carry long-lived Server-Sent Event connections.
    # Rules:
    #   proxy_buffering off   — must be off; X-Accel-Buffering header alone is not
    #                           reliable when nginx is compiled without ngx_http_proxy
    #                           pass-through support
    #   proxy_read_timeout    — must exceed the longest possible LLM tool-chain.
    #                           300s (5 min) matches the gateway/agent 3-minute timeout
    #                           with comfortable headroom.
    #   gzip off              — nginx gzip cannot flush partial compressed chunks;
    #                           enable gzip and SSE will never deliver events live.
    #   chunked_transfer_encoding on — required for streaming responses

    # Chat stream (POST /api/chat → Next.js → Go gateway → Python agent)
    location = /api/chat {
        proxy_pass          http://starnion_ui;
        proxy_buffering     off;
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        gzip                off;
        chunked_transfer_encoding on;
    }

    # Gateway log stream
    location = /api/logs/gateway/stream {
        proxy_pass          http://starnion_ui;
        proxy_buffering     off;
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        gzip                off;
        chunked_transfer_encoding on;
    }

    # WebSocket upgrade (used by ws:// chat connections if enabled)
    location = /api/ws {
        proxy_pass              http://starnion_ui;
        proxy_buffering         off;
        proxy_read_timeout      3600s;  # WebSocket connections are long-lived
        proxy_send_timeout      3600s;
        gzip                    off;
    }

    # Direct gateway API calls from UI server (internal; not browser-facing)
    # Exposed only if you route /gateway/* directly from nginx instead of through Next.js
    # location /gateway/ {
    #     proxy_pass          http://starnion_gateway/;
    #     proxy_buffering     off;
    #     proxy_read_timeout  300s;
    #     gzip                off;
    # }

    # ── All other UI requests ─────────────────────────────────────────────────
    location / {
        proxy_pass          http://starnion_ui;
        proxy_buffering     on;     # buffering OK for regular page/API requests
        proxy_read_timeout  60s;

        # Security headers
        add_header X-Content-Type-Options  "nosniff"         always;
        add_header X-Frame-Options         "SAMEORIGIN"      always;
        add_header Referrer-Policy         "strict-origin"   always;
    }

    # ── Static asset caching ──────────────────────────────────────────────────
    location /_next/static/ {
        proxy_pass          http://starnion_ui;
        proxy_buffering     on;
        expires             1y;
        add_header          Cache-Control "public, immutable";
    }

    # ── Max body size (for file uploads via MinIO pre-signed URLs) ────────────
    client_max_body_size 50m;
}
