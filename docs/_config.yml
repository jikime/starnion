title: Starnion Docs
description: "Personal AI Agent Platform — Self-hosted, privacy-first"
url: "https://jikime.github.io"
baseurl: "/starnion"
lang: en

remote_theme: just-the-docs/just-the-docs@v0.10.0

color_scheme: dark

# Navigation
nav_enabled: true
nav_sort: order

# Search
search_enabled: true
search_tokenizer_separator: /[\s/]+/

# Footer
footer_content: "Copyright &copy; 2025 Starnion. All rights reserved."

# Language switcher links in header
nav_external_links:
  - title: 🇰🇷 한국어
    url: ko/
  - title: 🇺🇸 English
    url: en/
  - title: 🇨🇳 中文
    url: zh/
  - title: 🇯🇵 日本語
    url: ja/

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-github-metadata

# Exclude from build
exclude:
  - "*.sh"
  - Gemfile
  - Gemfile.lock
  - node_modules
  - "dev/"
  - deploy.md
  - local-test-deploy.md
