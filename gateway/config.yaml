server:
  host: "0.0.0.0"
  port: 8080

grpc:
  agent_service:
    host: "localhost"
    port: 50051

cors:
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "Authorization"
    - "Content-Type"

log:
  level: "debug"
  format: "json"
